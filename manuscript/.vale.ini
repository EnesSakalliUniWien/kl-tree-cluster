StylesPath = styles
MinAlertLevel = warning
Packages = write-good, alex

[*.tex]
BasedOnStyles = write-good, alex, KLTE
BlockIgnores = (?s)\\begin\{equation\*?\}.*?\\end\{equation\*?\}, (?s)\\begin\{align\*?\}.*?\\end\{align\*?\}, (?s)\\begin\{tikzpicture\}.*?\\end\{tikzpicture\}
TokenIgnores = \$[^$]+\$
write-good.E-Prime = NO
write-good.Passive = NO
write-good.TooWordy = NO
write-good.Weasel = NO
alex.ProfanityLikely = NO
alex.ProfanityMaybe = NO
alex.ProfanityUnlikely = NO
